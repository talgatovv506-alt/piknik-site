<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Рахмет!</title>
    <style>
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }
        h1 {
            color: white;
            font-size: 3em;
            text-align: center;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <h1>Рахмет, сені күтем ❤️<br>Пикникке дайындал! 🎒</h1>
</body>
</html>
