<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пикник?</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            overflow: hidden;
        }
        h1 {
            color: white;
            font-size: 2.5em;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 50px;
            padding: 0 20px;
        }
        .btn-container {
            position: relative;
            width: 100vw;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
        }
        button {
            padding: 15px 40px;
            font-size: 1.5em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        #iya {
            background: #4CAF50;
            color: white;
            position: relative;
        }
        #iya:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        #zhok {
            background: #f44336;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>
    <h1>Кәусар бүгін менімен пикникке барасың ба? 😊</h1>

    <div class="btn-container">
        <button id="iya" onclick="window.location.href='/rakmet'">Ия</button>
        <button id="zhok">Жоқ</button>
    </div>

    <script>
        const zhokBtn = document.getElementById('zhok');
        const iyaBtn = document.getElementById('iya');
        let scale = 1;
        let clickCount = 0;

        zhokBtn.addEventListener('mouseover', function() {
            clickCount++;

            // "Жоқ" батырмасын қашырт
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 200) + 100;
            zhokBtn.style.left = x + 'px';
            zhokBtn.style.top = y + 'px';

            // "Ия" батырмасын үлкейт
            scale += 0.3;
            iyaBtn.style.transform = `scale(${scale})`;
            iyaBtn.textContent = 'Ия'.repeat(Math.min(clickCount, 3)); // Ия-Ия-Ия деп ұзарады

            if(clickCount > 3) {
                zhokBtn.textContent = 'Окей Ия 😅';
            }
        });

        zhokBtn.addEventListener('click', function() {
            alert('Қашып құтылмайсың 😏 "Ия" батырмасы сені күтіп тұр!');
        });
    </script>
</body>
</html>
