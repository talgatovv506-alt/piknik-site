<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пикник?</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            overflow: hidden;
        }
        h1 {
            color: white;
            font-size: 2.5em;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 50px;
            padding: 0 20px;
        }
        .btn-container {
            position: relative;
            width: 300px;
            height: 100px;
        }
        button {
            padding: 15px 40px;
            font-size: 1.5em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            position: absolute;
            font-weight: bold;
        }
        #iya {
            background: #4CAF50;
            color: white;
            left: 20px;
        }
        #zhok {
            background: #f44336;
            color: white;
            right: 20px;
        }
    </style>
</head>
<body>
    <h1>Кәусар бүгін менімен пикникке барасың ба? 😊</h1>

    <div class="btn-container">
        <button id="iya" onclick="window.location.href='/rakmet'">Ия</button>
        <button id="zhok">Жоқ</button>
    </div>

    <script>
        const zhokBtn = document.getElementById('zhok');
        zhokBtn.addEventListener('mouseover', function() {
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 100);
            zhokBtn.style.left = x + 'px';
            zhokBtn.style.top = y + 'px';
            zhokBtn.style.position = 'absolute';
        });
    </script>
</body>
</html>
