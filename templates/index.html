<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пикник?</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            font-family: Arial;
            padding-top: 50px;
        }
        h1 {
            color: white;
            font-size: 2em;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 80px;
            padding: 0 20px;
        }
        .btn-container {
            display: flex;
            gap: 40px;
            justify-content: center;
        }
        button {
            padding: 15px 40px;
            font-size: 1.5em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.15s;
        }
        #iya {
            background: #4CAF50;
            color: white;
        }
        #zhok {
            background: #f44336;
            color: white;
        }

        /* ТЕЛЕФОН ҮШІН */
        @media screen and (max-width: 600px) {
            h1 {
                font-size: 1.6em;
                margin-bottom: 120px;
            }
            .btn-container {
                flex-direction: column;
                gap: 50px;
            }
            button {
                padding: 18px 50px;
                font-size: 1.4em;
                width: 200px;
            }
        }
    </
