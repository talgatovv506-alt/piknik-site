<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пикник?</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            overflow: hidden;
        }
        h1 {
            color: white;
            font-size: 2.5em;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 50px;
            padding: 0 20px;
            z-index: 10;
        }
        button {
            padding: 15px 40px;
            font-size: 1.5em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            position: absolute;
            transition: transform 0.1s;
        }
        #iya {
            background: #4CAF50;
            color: white;
            z-index: 5;
        }
        #zhok {
            background: #f44336;
            color: white;
            z-index: 6;
        }
    </style>
</head>
<body>
    <h1>Кәусар бүгін менімен пикникке барасың ба? 😊</h1>

    <button id="iya" onclick="window.location.href='/rakmet'">Ия</button>
    <button id="zhok">Жоқ</button>

    <script>
        const zhokBtn = document.getElementById('zhok');
        const iyaBtn = document.getElementById('iya');
        let scale = 1;

        // Бастапқы позиция
        iyaBtn.style.left = '45%';
        iyaBtn.style.top = '55%';
        zhokBtn.style.left = '55%';
        zhokBtn.style.top = '55%';

        zhokBtn.addEventListener('mouseover', function() {
            // "Ия" батырмасының өлшемін ал
            const iyaRect = iyaBtn.getBoundingClientRect();
            const iyaWidth = iyaRect.width;
            const iyaHeight = iyaRect.height;

            // Егер "Ия" экранның 80%-нан үлкен болса, қашуды тоқтат
            if(iyaWidth > window.innerWidth * 0.8 || iyaHeight > window.innerHeight * 0.8) {
                zhokBtn.style.display = 'none';
                return;
            }

            // "Жоқ" қашады
            const maxX = window.innerWidth - 150;
            const maxY = window.innerHeight - 100;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;
            zhokBtn.style.left = x + 'px';
            zhokBtn.style.top = y + 'px';

            // "Ия" үлкейеді, бірақ текст өзгермейді
            scale += 0.25;
            iyaBtn.style.transform = `scale(${scale})`;
        });

        zhokBtn.addEventListener('click', function() {
            alert('Қашып құтылмайсың 😏 Ия батырмасы барған сайын үлкейіп барады!');
        });
    </script>
</body>
</html>
