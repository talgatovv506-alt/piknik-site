<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пикник?</title>
<style>
body {
background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
height: 100vh;
margin: 0;
display: flex;
flex-direction: column;
justify-content: flex-start;
align-items: center;
font-family: Arial;
padding-top: 50px;
position: relative;
overflow: hidden;
}
h1 {
color: white;
font-size: 2em;
text-align: center;
margin-bottom: 80px;
padding: 0 20px;
z-index: 10;
}
.btn-container {
display: flex;
gap: 40px;
justify-content: center;
position: relative;
z-index: 5;
}
button {
padding: 15px 40px;
font-size: 1.5em;
border: none;
border-radius: 25px;
cursor: pointer;
font-weight: bold;
transition: transform 0.15s;
}
#iya { background: #4CAF50; color: white; }
#zhok { background: #f44336; color: white; }
@media screen and (max-width: 600px) {
h1 { font-size: 1.6em; margin-bottom: 120px; }
.btn-container { flex-direction: column; gap: 50px; }
button { padding: 18px 50px; font-size: 1.4em; width: 200px; }
}
</style>
</head>
<body>
<h1>Кәусар бүгін менімен пикникке барасың ба? 😊</h1>
<div class="btn-container">
<button id="iya" onclick="window.location.href='/rakmet'">Ия</button>
<button id="zhok">Жоқ</button>
</div>
<script>
window.onload = function() {
const zhokBtn = document.getElementById('zhok');
const iyaBtn = document.getElementById('iya');
let scale = 1;
function moveButton() {
if(window.innerWidth > 600) {
zhokBtn.style.position = 'absolute';
let maxX = window.innerWidth - zhokBtn.offsetWidth;
let maxY = window.innerHeight - zhokBtn.offsetHeight;
let x = Math.random() * maxX;
let y = Math.random() * maxY;
zhokBtn.style.left = x + 'px';
zhokBtn.style.top = y + 'px';
scale += 0.18;
iyaBtn.style.transform = 'scale(' + scale + ')';
if(scale > 3) {
zhokBtn.style.display = 'none';
}
zhokBtn.addEventListener('mouseover', moveButton);
zhokBtn.addEventListener('click', function() {
alert('Қашып құтылмайсың 😂 Ия-ны бас!');
});
}
</script>
</body>
</html>
